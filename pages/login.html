<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Picnic CSS Boilerplate</title>
    <link rel="stylesheet" href="../css/picnic.min.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8f9fa;">
        <div class="card" style="max-width: 400px; width: 100%; margin: 1rem;">
            <header>
                <h2>Login</h2>
            </header>
            <section>
                <form>
                    <label>
                        Email or Username:
                        <input type="email" placeholder="Enter your email">
                    </label>
                    <label>
                        Password:
                        <input type="password" placeholder="Enter your password">
                    </label>
                    <label>
                        <input type="checkbox" class="checkable">
                        <span class="checkable">Remember me</span>
                    </label>
                    <p>
                        <button type="submit" class="button">Login</button>
                    </p>
                    <p style="text-align: center;">
                        <a href="#">Forgot password?</a> | 
                        <a href="../index.html">Back to Home</a>
                    </p>
                </form>
            </section>
        </div>
    </div>
</body>
</html>
